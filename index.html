<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的莫蘭迪珍藏櫃</title>
    <style>
        :root {
            /* 莫蘭迪高級色盤 */
            --bg-color: #f2f1ed;       /* 燕麥米灰（網頁底色） */
            --card-bg: #ffffff;        /* 純白卡片襯底 */
            --text-main: #4a4947;      /* 深石墨灰（標題字） */
            --text-sub: #7a7975;       /* 煙燻灰（說明字） */
            --accent-pink: #b89088;    /* 乾燥玫瑰粉（按鈕、高亮） */
            --accent-green: #96a191;   /* 尤加利綠（輔助色） */
            --border-color: #e5e5e1;   /* 淺灰質感動態邊框 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent-pink);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 卡片設計 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        /* 多圖輪播容器 (保持 1:1 比例以免照片變形) */
        .carousel-container {
            width: 100%;
            padding-top: 100%; 
            position: relative;
            background-color: #faf9f6;
            overflow: hidden;
        }

        .carousel-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: zoom-in; /* 滑鼠移上去顯示放大鏡符號 */
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 輪播左右箭頭鈕 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-main);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s, color 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .carousel-btn:hover {
            background: #ffffff;
            color: var(--accent-pink);
        }

        .carousel-btn.prev { left: 12px; }
        .carousel-btn.next { right: 12px; }

        /* 輪播指示小圓點 */
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .dot.active {
            background: var(--accent-pink);
            transform: scale(1.3);
        }

        /* 文字內容區 */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 數量控制器（圓角莫蘭迪條狀） */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            border-radius: 30px;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
        }

        .btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(184, 144, 136, 0.2);
        }

        .btn:hover {
            background: #a37d75;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .count {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            min-width: 50px;
            text-align: center;
        }

        /* 🔍 燈箱大圖彈出功能 (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 73, 71, 0.95); /* 高級暗灰磨砂遮罩 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .lightbox.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            color: #ffffff;
            font-size: 40px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--accent-pink);
        }
    </style>
</head>
<body>

    <header>
        <h1>M O R A N D I &nbsp; C O L L E C T I O N</h1>
        <p>我的周邊收集櫃 ‧ 靜謐美學整理空間</p>
    </header>

    <div class="grid-container" id="grid">
        </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="放大檢視">
    </div>

    <script>
        // ==========================================================
        // 🛠️ 【周邊資料庫設定區】：在這裡修改、新增你的收藏項目
        // ==========================================================
        // 💡 多張圖片寫法：用括號包住多個檔名，例如：imgs: ['stand.jpg', 'card.jpg']
        // 💡 單張圖片寫法：就算只有一張也要用括號包著，例如：imgs: ['card.jpg']
        const itemsData = [
            { 
                id: 'item_1', 
                title: '人生四格收藏小卡', 
                desc: '全新系列人生四格寫真，包含限定專用保護硬膠套。', 
                imgs: ['stand.jpg', 'card.jpg'] // 同一個卡片支援多張圖
            },
            { 
                id: 'item_2', 
                title: '角色壓克力立牌', 
                desc: '夏日祭典主題雙面高透明壓克力立牌，做工細緻。', 
                imgs: ['card.jpg', 'stand.jpg'] 
            },
            { 
                id: 'item_3', 
                title: '限定珍藏同人誌畫冊', 
                desc: '全彩 40P 特典版畫集，燙金封面與特種特白紙印刷。', 
                imgs: ['stand.jpg'] // 單張圖片項目一樣完全支援
            }
        ];

        const gridContainer = document.getElementById('grid');

        // 生成網頁畫面的主要功能
        itemsData.forEach(item => {
            const savedCount = localStorage.getItem(item.id) || 0;
            const card = document.createElement('div');
            card.className = 'card';

            // 處理多圖與單圖的輪播 HTML 邏輯
            let carouselHTML = '';
            if (item.imgs.length > 1) {
                carouselHTML = `
                    <button class="carousel-btn prev" onclick="moveCarousel('${item.id}', -1, event)">&lsaquo;</button>
                    <button class="carousel-btn next" onclick="moveCarousel('${item.id}', 1, event)">&rsaquo;</button>
                    <div class="carousel-track" id="track-${item.id}">
                        ${item.imgs.map(img => `
                            <div class="carousel-slide" onclick="openLightbox('${img.trim()}')">
                                <img src="${img.trim()}" alt="${item.title}">
                            </div>
                        `).join('')}
                    </div>
                    <div class="carousel-dots" id="dots-${item.id}">
                        ${item.imgs.map((_, idx) => `
                            <span class="dot ${idx === 0 ? 'active' : ''}" onclick="setCarouselSlide('${item.id}', ${idx}, event)"></span>
                        `).join('')}
                    </div>
                `;
            } else {
                carouselHTML = `
                    <div class="carousel-track">
                        <div class="carousel-slide" onclick="openLightbox('${item.imgs[0].trim()}')">
                            <img src="${item.imgs[0].trim()}" alt="${item.title}">
                        </div>
                    </div>
                `;
            }

            card.innerHTML = `
                <div class="carousel-container">
                    ${carouselHTML}
                </div>
                <div class="content">
                    <div>
                        <div class="title">${item.title}</div>
                        <div class="description">${item.desc}</div>
                    </div>
                    <div class="counter-container">
                        <button class="btn" onclick="updateCount('${item.id}', -1)">-</button>
                        <span class="count" id="count-${item.id}">${savedCount}</span>
                        <button class="btn" onclick="updateCount('${item.id}', 1)">+</button>
                    </div>
                </div>
            `;
            
            card.dataset.currentIdx = 0; // 初始化當前圖片索引
            gridContainer.appendChild(card);
        });

        // 1. 數量增減與 LocalStorage 紀錄
        function updateCount(id, change) {
            const countSpan = document.getElementById(`count-${id}`);
            let currentCount = parseInt(countSpan.innerText);
            let newCount = currentCount + change;
            if (newCount < 0) newCount = 0;
            countSpan.innerText = newCount;
            localStorage.setItem(id, newCount);
        }

        // 2. 輪播左右移動核心邏輯
        function moveCarousel(id, direction, event) {
            event.stopPropagation(); // 阻止點擊箭頭時不小心觸發放大燈箱
            const track = document.getElementById(`track-${id}`);
            const card = track.closest('.card');
            const item = itemsData.find(i => i.id === id);
            let currentIdx = parseInt(card.dataset.currentIdx);

            currentIdx += direction;
            if (currentIdx < 0) currentIdx = item.imgs.length - 1;
            if (currentIdx >= item.imgs.length) currentIdx = 0;

            card.dataset.currentIdx = currentIdx;
            updateCarouselDOM(id, currentIdx);
        }

        // 3. 點擊指示點切換圖片
        function setCarouselSlide(id, idx, event) {
            event.stopPropagation();
            const track = document.getElementById(`track-${id}`);
            const card = track.closest('.card');
            card.dataset.currentIdx = idx;
            updateCarouselDOM(id, idx);
        }

        // 更新圖片輪播的位置與圓點狀態
        function updateCarouselDOM(id, idx) {
            const track = document.getElementById(`track-${id}`);
            track.style.transform = `translateX(-${idx * 100}%)`;
            
            const dotsContainer = document.getElementById(`dots-${id}`);
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index === idx) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        // 4. 🔍 點開大圖功能 (Lightbox)
        function openLightbox(imgSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imgSrc;
            lightbox.style.display = 'flex';
            setTimeout(() => lightbox.classList.add('active'), 10);
        }

        // 關閉大圖
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            setTimeout(() => lightbox.style.display = 'none', 300);
        }
    </script>
</body>
</html>
