<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Twogether週邊清單</title>
    <style>
        :root {
            /* 莫蘭迪高級色盤 */
            --bg-color: #f2f1ed;       /* 燕麥米灰（網頁底色） */
            --card-bg: #ffffff;        /* 純白卡片襯底 */
            --text-main: #1F3023;      /* 深石墨灰（標題字） */
            --text-sub: #7a7975;       /* 煙燻灰（說明字） */
            --accent-pink: #3B3B3B;    /* 乾燥玫瑰粉（按鈕、高亮） */
            --accent-green: #96a191;   /* 尤加利綠（輔助色） */
            --border-color: #e5e5e1;   /* 淺灰質感動態邊框 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent-pink);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* 分區域容器與標題樣式 */
        .category-section {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 50px auto;
        }

        .category-title {
            font-size: 1.4rem;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid var(--accent-pink); /* 莫蘭迪粉精緻側邊條 */
            letter-spacing: 1px;
        }

        /* 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
        }

        /* 卡片設計 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        /* 多圖輪播容器 (保持 1:1 比例以免照片變形) */
        .carousel-container {
            width: 100%;
            padding-top: 100%; 
            position: relative;
            background-color: #faf9f6;
            overflow: hidden;
        }

        .carousel-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: zoom-in;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 輪播左右箭頭鈕 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-main);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s, color 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .carousel-btn:hover {
            background: #ffffff;
            color: var(--accent-pink);
        }

        .carousel-btn.prev { left: 12px; }
        .carousel-btn.next { right: 12px; }

        /* 輪播指示小圓點 */
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .dot.active {
            background: var(--accent-pink);
            transform: scale(1.3);
        }

        /* 文字內容區 */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 數量控制器（圓角莫蘭迪條狀） */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            border-radius: 30px;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
        }

        .counter-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-sub);
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(184, 144, 136, 0.2);
        }

        .btn:hover {
            background: #a37d75;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .count {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            min-width: 40px;
            text-align: center;
        }

        /* 🔍 燈箱大圖彈出功能 (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 30, 30, 0.95); /* 高級暗黑磨砂 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-wrapper {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            user-select: none;
        }

        /* 燈箱關閉按鈕 */
        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: #ffffff;
            font-size: 40px;
            cursor: pointer;
            z-index: 1020;
            line-height: 1;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--accent-pink);
        }

        /* 獨立、不受大圖干擾的燈箱滑動按鈕 */
        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1010;
            transition: background 0.2s, color 0.2s;
        }

        .lightbox-btn:hover {
            background: #ffffff;
            color: var(--text-main);
        }

        .lightbox-btn.prev { left: -70px; }
        .lightbox-btn.next { right: -70px; }

        /* 當只有一張圖片時隱藏按鈕 */
        .lightbox-btn.hidden {
            display: none !important;
        }

        /* 手機板適配調整：將箭頭收進畫面內部，防止點不到 */
        @media (max-width: 900px) {
            .lightbox-btn.prev { left: 10px; background: rgba(0,0,0,0.6); }
            .lightbox-btn.next { right: 10px; background: rgba(0,0,0,0.6); }
            .lightbox-close { right: 10px; top: -50px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>M O R A N D I &nbsp; C O L L E C T I O N</h1>
        <p>我的周邊收集櫃 ‧ 靜謐美學整理空間</p>
    </header>

    <!-- 📁 分區外殼大盒子：有分區功能的卡片網格會透過 JS 自動動態塞入這裡 -->
    <div id="main-content-wrapper"></div>

    <!-- 🔍 燈箱結構（內建左右滑動與關閉） -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-wrapper" id="lightbox-wrapper">
            <span class="lightbox-close" id="lightbox-close">&times;</span>
            <button class="lightbox-btn prev" id="lightbox-prev">&#10094;</button>
            <img class="lightbox-img" id="lightbox-img" src="" alt="放大檢視">
 	    <button class="lightbox-btn next" id="lightbox-next">&#10095;</button>
        </div>
    </div>


<script>
    // ==========================================================
    // 🛠️ 【周邊資料庫設定區】：在這裡修改、新增你的收藏項目
    // ==========================================================
    const itemsData = [
        { 
            id: 'item_1', 
            category: 'RIDI',
            title: '人生四格小卡組 13000', 
            desc: '網址：', 
            desc: '人生四格+小卡x2',
            imgs: ['stand.jpg', 'card.jpg']
        },
        { 
            id: 'item_2', 
            category: '區域一：珍藏卡片與立牌',
            title: '角色壓克力立牌', 
            desc: '夏日祭典主題雙面高透明壓克力立牌，做工細緻。', 
            imgs: ['card.jpg', 'stand.jpg'] 
        },
        { 
            id: 'item_3', 
            category: '區域二：書籍與畫冊類',
            title: '限定珍藏同人誌畫冊', 
            desc: '全彩 40P 特典版畫集，燙金封面與特種特白紙印刷。', 
            imgs: ['stand.jpg'] 
        },
        { 
            id: 'item_4', 
            category: '區域二：書籍與畫冊類',
            title: '主題公式設定集', 
            desc: '收錄完整角色初始草稿、聲優訪談與世界觀精密解析。', 
            imgs: ['card.jpg'] 
        }
    ];

    // 紀錄目前放大的是哪一個商品識別 index、以及其第幾張圖 index
    let currentItemIdx = null;
    let currentImgIdx = 0;

    const mainWrapper = document.getElementById('main-content-wrapper');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxPrev = document.getElementById('lightbox-prev');
    const lightboxNext = document.getElementById('lightbox-next');
    const lightboxClose = document.getElementById('lightbox-close');

    // 1. 動態渲染「分區網格」與卡片的主要功能
    function initAndRender() {
        mainWrapper.innerHTML = "";

        // 先找出資料庫裡面總共有哪些不重複的區域名稱
        const categories = [...new Set(itemsData.map(item => item.category || "未分類區域"))];

        categories.forEach(catName => {
            // 為每個區域建立一個 Section 容器
            const section = document.createElement('section');
            section.className = 'category-section';

            // 建立區塊大標題
            const titleEl = document.createElement('h2');
            titleEl.className = 'category-title';
            titleEl.innerText = catName;
            section.appendChild(titleEl);

            // 建立該分區的卡片 Grid 網格
            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid-container';

            // 篩選出屬於這個區域的商品進行渲染
            itemsData.forEach((item, itemIndex) => {
                if ((item.category || "未分類區域") !== catName) return;

                const savedCount = localStorage.getItem(item.id) || 0;
                const card = document.createElement('div');
                card.className = 'card';

                // 處理多圖與單圖的輪播 HTML 邏輯
                let carouselHTML = '';
                if (item.imgs.length > 1) {
                    carouselHTML = `
                        <button class="carousel-btn prev" onclick="moveCarousel('${item.id}', -1, event)">&lsaquo;</button>  
                        <button class="carousel-btn next" onclick="moveCarousel('${item.id}', 1, event)">&rsaquo;</button>  
                        <div class="carousel-track" id="track-${item.id}">  
                            ${item.imgs.map((img, imgIdx) => `
                                <div class="carousel-slide" onclick="openLightbox(${itemIndex}, ${imgIdx})">
                                    <img src="${img.trim()}" alt="${item.title}">
                                </div>
                            `).join('')}  
                        </div>  
                        <div class="carousel-dots" id="dots-${item.id}">  
                            ${item.imgs.map((_, idx) => `
                                <span class="dot ${idx === 0 ? 'active' : ''}" onclick="setCarouselSlide('${item.id}', ${idx}, event)"></span>
                            `).join('')}  
                        </div>
                    `;
                } else {
                    carouselHTML = `
                        <div class="carousel-track">  
                            <div class="carousel-slide" onclick="openLightbox(${itemIndex}, 0)">  
                                <img src="${item.imgs[0].trim()}" alt="${item.title}">  
                            </div>  
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="carousel-container">  
                        ${carouselHTML}  
                    </div>  
                    <div class="content">  
                        <div>  
                            <div class="title">${item.title}</div>  
                            <div class="description">${item.desc}</div>  
                        </div>  
                        <div class="counter-container">  
                            <span class="counter-label">擁有數量：</span>  
                            <div class="counter-controls">  
                                <button class="btn" onclick="updateCount('${item.id}', -1)">-</button>  
                                <span class="count" id="count-${item.id}">${savedCount}</span>  
                                <button class="btn" onclick="updateCount('${item.id}', 1)">+</button>  
                            </div>  
                        </div>  
                    </div>
                `;

                card.dataset.currentIdx = 0; // 初始化當前圖片索引
                gridContainer.appendChild(card);
            });

            section.appendChild(gridContainer);
            mainWrapper.appendChild(section);
        });
    }

    // 2. 數量增減與 LocalStorage 紀錄
    function updateCount(id, change) {
        const countSpan = document.getElementById(`count-${id}`);
        let currentCount = parseInt(countSpan.innerText);
        let newCount = currentCount + change;
        if (newCount < 0) newCount = 0;
        countSpan.innerText = newCount;
        localStorage.setItem(id, newCount);
    }

    // 3. 輪播左右移動核心邏輯
    function moveCarousel(id, direction, event) {
        event.stopPropagation(); // 阻止點擊箭頭時不小心觸發放大燈箱
        const track = document.getElementById(`track-${id}`);
        const card = track.closest('.card');
        const item = itemsData.find(i => i.id === id);
        let currentIdx = parseInt(card.dataset.currentIdx);

        currentIdx += direction;
        if (currentIdx < 0) currentIdx = item.imgs.length - 1;
        if (currentIdx >= item.imgs.length) currentIdx = 0;

        card.dataset.currentIdx = currentIdx;
        updateCarouselDOM(id, currentIdx);
    }

    // 4. 點擊指示點切換圖片
    function setCarouselSlide(id, idx, event) {
        event.stopPropagation();
        const track = document.getElementById(`track-${id}`);
        const card = track.closest('.card');
        card.dataset.currentIdx = idx;
        updateCarouselDOM(id, idx);
    }

    // 更新圖片輪播的位置與圓點狀態
    function updateCarouselDOM(id, idx) {
        const track = document.getElementById(`track-${id}`);
        track.style.transform = `translateX(-${idx * 100}%)`;
        const dotsContainer = document.getElementById(`dots-${id}`);
        const dots = dotsContainer.querySelectorAll('.dot');
        dots.forEach((dot, index) => {
            if (index === idx) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    // ==========================================================
    // 🔍 【燈箱大圖彈出功能與核心左右切換邏輯】
    // ==========================================================
    function openLightbox(itemIndex, imgIdx) {
        currentItemIdx = itemIndex;
        currentImgIdx = imgIdx;
        updateLightbox();
        lightbox.style.display = 'flex';
        setTimeout(() => lightbox.classList.add('active'), 10);
        document.body.style.overflow = 'hidden'; // 防止底層網頁捲動
    }

    function updateLightbox() {
        const item = itemsData[currentItemIdx];
        lightboxImg.src = item.imgs[currentImgIdx].trim();

        // 如果圖片數量小於等於 1，隱藏左右滑動按鈕
        if (item.imgs.length <= 1) {
            lightboxPrev.classList.add('hidden');
            lightboxNext.classList.add('hidden');
        } else {
            lightboxPrev.classList.remove('hidden');
            lightboxNext.classList.remove('hidden');
        }
    }

    // 往左切換大圖
    function lightboxShowPrev() {
        const total = itemsData[currentItemIdx].imgs.length;
        currentImgIdx = (currentImgIdx - 1 + total) % total;
        updateLightbox();
    }

    // 往右切換大圖
    function lightboxShowNext() {
        const total = itemsData[currentItemIdx].imgs.length;
        currentImgIdx = (currentImgIdx + 1) % total;
        updateLightbox();
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        setTimeout(() => lightbox.style.display = 'none', 300);
        document.body.style.overflow = ''; // 還原捲軸
    }

    // 綁定大圖箭頭點擊事件
    lightboxPrev.addEventListener('click', (e) => {
        e.stopPropagation();
        lightboxShowPrev();
    });

    lightboxNext.addEventListener('click', (e) => {
        e.stopPropagation();
        lightboxShowNext();
    });

    lightboxClose.addEventListener('click', (e) => {
        e.stopPropagation();
        closeLightbox();
    });

    // 點擊黑色半透明背景處才關閉燈箱
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox || e.target === document.getElementById('lightbox-wrapper')) {
            closeLightbox();
        }
    });

    // 增加鍵盤快捷鍵支援
    document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') {
            lightboxShowPrev();
        } else if (e.key === 'ArrowRight') {
            lightboxShowNext();
        } else if (e.key === 'Escape') {
            closeLightbox();
        }
    });

    // 啟動初始化渲染
    initAndRender();
</script>
</body>
</html>
