<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的莫蘭迪珍藏櫃</title>
    <style>
        :root {
            /* 莫蘭迪高級色盤 */
            --bg-color: #f2f1ed;       /* 燕麥米灰（網頁底色） */
            --card-bg: #ffffff;        /* 純白卡片襯底 */
            --text-main: #4a4947;      /* 深石墨灰（標題字） */
            --text-sub: #7a7975;       /* 煙燻灰（說明字） */
            --accent-pink: #b89088;    /* 乾燥玫瑰粉（按鈕、高亮） */
            --accent-green: #96a191;   /* 尤加利綠（輔助色） */
            --border-color: #e5e5e1;   /* 淺灰質感動態邊框 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.2rem;
            color: var(--accent-pink);
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            color: var(--text-sub);
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* 網格佈局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 卡片設計 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06);
        }

        /* 多圖輪播容器 (保持 1:1 比例以免照片變形) */
        .carousel-container {
            width: 100%;
            padding-top: 100%; 
            position: relative;
            background-color: #faf9f6;
            overflow: hidden;
        }

        .carousel-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: zoom-in; /* 滑鼠移上去顯示放大鏡符號 */
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 輪播左右箭頭鈕 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85);
            color: var(--text-main);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s, color 0.2s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .carousel-btn:hover {
            background: #ffffff;
            color: var(--accent-pink);
        }

        .carousel-btn.prev { left: 12px; }
        .carousel-btn.next { right: 12px; }

        /* 輪播指示小圓點 */
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(0,0,0,0.15);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .dot.active {
            background: var(--accent-pink);
            transform: scale(1.3);
        }

        /* 文字內容區 */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .description {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 數量控制器（圓角莫蘭迪條狀） */
        .counter-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            border-radius: 30px;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
        }

        .counter-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-sub);
        }

        .counter-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn {
            background: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(184, 144, 136, 0.2);
        }

        .btn:hover {
            background: #a37d75;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .count {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            min-width: 40px;
            text-align: center;
        }

        /* 🔍 燈箱大圖彈出功能 (Lightbox) */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(42, 41, 40, 0.97); /* 更深沉優雅的黑灰遮罩 */
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content-wrapper {
            position: relative;
            max-width: 90%;
            max-height: 85%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .lightbox.active .lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: -45px;
            right: 0;
            color: #ffffff;
            font-size: 36px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--accent-pink);
        }

        /* 燈箱內的左右滑動按鈕 */
        .lightbox-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            z-index: 1010;
        }

        .lightbox-btn:hover {
            background: #ffffff;
            color: var(--text-main);
            transform: translateY(-50%) scale(1.05);
        }

        .lightbox-btn.prev { left: -70px; }
        .lightbox-btn.next { right: -70px; }

        /* 隱藏無效的燈箱按鈕 */
        .lightbox-btn.hidden {
            display: none;
        }

        /* 當螢幕較小時，將燈箱按鈕移進畫面內以免點不到 */
        @media (max-width: 768px) {
            .lightbox-btn.prev { left: 10px; background: rgba(0,0,0,0.5); }
            .lightbox-btn.next { right: 10px; background: rgba(0,0,0,0.5); }
            .lightbox-close { right: 10px; top: -50px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>M O R A N D I &nbsp; C O L L E C T I O N</h1>
        <p>我的周邊收集櫃 ‧ 靜謐美學整理空間</p>
    </header>

    <div class="grid-container" id="grid"></div>

    <!-- 🔍 燈箱大圖彈出功能 (已內建左右切換) -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content-wrapper">
            <span class="lightbox-close" id="close-btn">&times;</span>
            <button class="lightbox-btn prev" id="lightbox-prev">&#10094;</button>
            <img class="lightbox-img" id="lightbox-img" src="" alt="放大檢視">
            <button class="lightbox-btn next" id="lightbox-next">&#10095;</button>
        </div>
    </div>

    <script>
